  <text x="195" y="171" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#22392c">configs + losses</text>

  <rect x="420" y="75" width="320" height="150" rx="28" fill="#d9e6ff" stroke="#244676" stroke-width="4"/>
  <text x="580" y="122" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="34" fill="#244676">Surrogate Model</text>
  <text x="580" y="158" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#244676">estimate promising region</text>
  <text x="580" y="190" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#244676">and uncertainty</text>

  <rect x="420" y="300" width="320" height="150" rx="28" fill="#ffd9c7" stroke="#72341f" stroke-width="4"/>

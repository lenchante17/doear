  <text x="580" y="415" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#72341f">better candidates</text>

  <rect x="840" y="115" width="280" height="110" rx="24" fill="#f9e6b8" stroke="#624500" stroke-width="4"/>
  <text x="980" y="157" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="32" fill="#624500">Next Configs</text>

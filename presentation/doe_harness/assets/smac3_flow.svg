<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <rect width="1200" height="600" fill="#f6f2ec"/>

  <rect x="70" y="90" width="250" height="120" rx="28" fill="#d8e7d1" stroke="#22392c" stroke-width="4"/>

  <rect x="840" y="325" width="280" height="110" rx="24" fill="#fff8ea" stroke="#624500" stroke-width="4"/>
  <text x="980" y="367" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="32" fill="#624500">Incumbent</text>
  <text x="980" y="401" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#624500">survives more budget</text>

  <path d="M320 150 C370 150, 380 150, 420 150" fill="none" stroke="#22392c" stroke-width="5"/>
  <polygon points="409,139 432,150 409,161" fill="#22392c"/>

  <path d="M580 225 C580 255, 580 270, 580 300" fill="none" stroke="#244676" stroke-width="5"/>
  <polygon points="569,289 580,312 591,289" fill="#244676"/>

